<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bambara TTS Interface</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    label {
      font-size: 18px;
      color: #333;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: #fff;
      font-size: 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .audio-container {
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Bambara TTS API</h1>
    <form id="ttsForm">
      <label for="bambaraWord">Enter Bambara Word:</label>
      <input type="text" id="bambaraWord" placeholder="e.g., abada" required />
      <button type="submit">Generate Audio</button>
    </form>
    <div class="audio-container" id="audioContainer">
      <!-- Audio player will appear here -->
    </div>
  </div>

  <script>
    const form = document.getElementById("ttsForm");
    const audioContainer = document.getElementById("audioContainer");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const word = document.getElementById("bambaraWord").value;
      const apiUrl = "https://donniya-tts.vercel.app/tts"; // Replace with your API URL

      // Clear previous audio
      audioContainer.innerHTML = "";

      try {
        // Send POST request to the API
        const response = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ title: word, category: "bambara" }),
        });

        if (!response.ok) {
          throw new Error(`Error: ${response.statusText}`);
        }

        // Create an audio element to play the generated audio
        const blob = await response.blob();
        const audioUrl = URL.createObjectURL(blob);

        const audio = document.createElement("audio");
        audio.controls = true;
        audio.src = audioUrl;

        audioContainer.appendChild(audio);
      } catch (error) {
        console.error("Error:", error);
        audioContainer.innerHTML = `<p style="color: red;">Failed to generate audio: ${error.message}</p>`;
      }
    });
  </script>
</body>
</html>
